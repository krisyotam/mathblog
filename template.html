<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post_title }}</title>
    <link rel="stylesheet" href="/posts/css/blogs.css">
    <script type="text/javascript" src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <header>
        <div class="sidebar-left"></div>
        <div class="header-content">
            <h1>Kris Yotam's Math Blog</h1>
            <nav class="navbar">
                <ul>
                    <li><a href="/index.html">HOME</a></li>
                    <li><a href="/pages/html/book-picks.html">BOOK PICKS</a></li>
                    <li><a href="/pages/html/projects.html">PROJECTS</a></li>
                    <li><a href="/pages/html/resources.html">RESOURCES</a></li>
                    <li><a href="/pages/html/about.html">ABOUT</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="content-wrapper">
        <article class="blog-post">
            <h2>{{ post_title }}</h2>
            <section class="post-meta">
                <p><strong>Posted on:</strong> {{ post_date }}</p>
                <p><strong>Tagged:</strong> 
                    {{ post_tags }}
                </p>
            </section>
            <div class="meta-separator"></div> <!-- Add this line -->
            <div class="post-content">
                {{ post_content }}
            </div>
        </article>
    </div>
    <footer>
        <p>&copy; 2024 Made with ❤️ by Kris Yotam</p>
    </footer>
</body>
</html>
